# AeroSpace — tiling WM for macOS. Omarchy/Hyprland-flavored.
#
# WM modifier = Cmd+Ctrl+Alt  (emitted by hold-F on the Corne's macOS layer).
# Shift is deliberately NOT part of the modifier, so it stays free for the
# "+Shift = move" convention — mirroring Hyprland's Super / Super+Shift exactly.
# On Linux the same physical key (hold-F) is plain Super; the gestures match.

start-at-login = true

# Tiling defaults
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'   # wide screens split L/R, tall split T/B

# Breathing room (matches WezTerm's 8px padding)
[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.right = 8
outer.top = 8
outer.bottom = 8

[mode.main.binding]
# --- Focus windows (Hyprland SUPER+hjkl) ---
cmd-ctrl-alt-h = 'focus left'
cmd-ctrl-alt-j = 'focus down'
cmd-ctrl-alt-k = 'focus up'
cmd-ctrl-alt-l = 'focus right'

# --- Move/swap windows (SUPER+Shift+hjkl) ---
cmd-ctrl-alt-shift-h = 'move left'
cmd-ctrl-alt-shift-j = 'move down'
cmd-ctrl-alt-shift-k = 'move up'
cmd-ctrl-alt-shift-l = 'move right'

# --- Workspaces (SUPER+1-9) ---
cmd-ctrl-alt-1 = 'workspace 1'
cmd-ctrl-alt-2 = 'workspace 2'
cmd-ctrl-alt-3 = 'workspace 3'
cmd-ctrl-alt-4 = 'workspace 4'
cmd-ctrl-alt-5 = 'workspace 5'
cmd-ctrl-alt-6 = 'workspace 6'
cmd-ctrl-alt-7 = 'workspace 7'
cmd-ctrl-alt-8 = 'workspace 8'
cmd-ctrl-alt-9 = 'workspace 9'

# Send focused window to workspace N (SUPER+Shift+1-9)
cmd-ctrl-alt-shift-1 = 'move-node-to-workspace 1'
cmd-ctrl-alt-shift-2 = 'move-node-to-workspace 2'
cmd-ctrl-alt-shift-3 = 'move-node-to-workspace 3'
cmd-ctrl-alt-shift-4 = 'move-node-to-workspace 4'
cmd-ctrl-alt-shift-5 = 'move-node-to-workspace 5'
cmd-ctrl-alt-shift-6 = 'move-node-to-workspace 6'
cmd-ctrl-alt-shift-7 = 'move-node-to-workspace 7'
cmd-ctrl-alt-shift-8 = 'move-node-to-workspace 8'
cmd-ctrl-alt-shift-9 = 'move-node-to-workspace 9'

# Cycle workspaces without number keys (Hyprland SUPER+Tab style)
cmd-ctrl-alt-tab       = 'workspace --wrap-around next'
cmd-ctrl-alt-shift-tab = 'workspace --wrap-around prev'
# Jump back to the previously focused workspace (like Alt+Tab toggle)
cmd-ctrl-alt-backspace = 'workspace-back-and-forth'

# --- Layout / window state ---
cmd-ctrl-alt-slash = 'layout tiles horizontal vertical'   # toggle split orientation
cmd-ctrl-alt-m     = 'fullscreen'                          # maximize focused window
cmd-ctrl-alt-t     = 'layout floating tiling'             # toggle float/tiling on focused window

# --- Multi-monitor ---
cmd-ctrl-alt-comma  = 'focus-monitor left'
cmd-ctrl-alt-period = 'focus-monitor right'
cmd-ctrl-alt-shift-comma  = 'move-node-to-monitor left'
cmd-ctrl-alt-shift-period = 'move-node-to-monitor right'

# --- Resize sub-mode: enter, then hjkl resize, Esc/Enter exits ---
cmd-ctrl-alt-r = 'mode resize'

# --- Reload config after edits ---
cmd-ctrl-alt-shift-r = 'reload-config'

[mode.resize.binding]
h = 'resize width -50'
l = 'resize width +50'
k = 'resize height -50'
j = 'resize height +50'
enter = 'mode main'
esc = 'mode main'
