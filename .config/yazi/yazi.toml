[opener]
edit = [
	{ run = 'nvim "%*"', block = true, for = "windows" },
	{ run = 'nvim "$@"', block = true, for = "unix" },
]

# C/C++ files: VS Code on Windows, nvim on macOS/Linux
cpp = [
	{ run = 'code "%*"', block = false, orphan = true, for = "windows" },
	{ run = 'nvim "$@"', block = true, for = "unix" },
]

[open]
prepend_rules = [
	# C/C++ files
	{ name = "*.c", use = "cpp" },
	{ name = "*.cpp", use = "cpp" },
	{ name = "*.cc", use = "cpp" },
	{ name = "*.cxx", use = "cpp" },
	{ name = "*.h", use = "cpp" },
	{ name = "*.hpp", use = "cpp" },
	{ name = "*.hxx", use = "cpp" },
	
	# Common text file extensions
	{ name = "*.toml", use = "edit" },
	{ name = "*.txt", use = "edit" },
	{ name = "*.md", use = "edit" },
	{ name = "*.json", use = "edit" },
	{ name = "*.yaml", use = "edit" },
	{ name = "*.yml", use = "edit" },
	{ name = "*.lua", use = "edit" },
	{ name = "*.py", use = "edit" },
	{ name = "*.rs", use = "edit" },
	{ name = "*.sh", use = "edit" },
	{ name = "*.xml", use = "edit" },
]
