[opener]
edit = [
	{ run = 'nvim %s', block = true, for = "windows" },
	{ run = 'nvim %s', block = true, for = "unix" },
]

# C/C++ files: VS Code on Windows, nvim on macOS/Linux
cpp = [
	{ run = 'code %s', block = false, orphan = true, for = "windows" },
	{ run = 'nvim %s', block = true, for = "unix" },
]

[open]
prepend_rules = [
	# C/C++ files
	{ url = "*.c", use = "cpp" },
	{ url = "*.cpp", use = "cpp" },
	{ url = "*.cc", use = "cpp" },
	{ url = "*.cxx", use = "cpp" },
	{ url = "*.h", use = "cpp" },
	{ url = "*.hpp", use = "cpp" },
	{ url = "*.hxx", use = "cpp" },
	
	# Common text file extensions
	{ url = "*.toml", use = "edit" },
	{ url = "*.txt", use = "edit" },
	{ url = "*.md", use = "edit" },
	{ url = "*.json", use = "edit" },
	{ url = "*.yaml", use = "edit" },
	{ url = "*.yml", use = "edit" },
	{ url = "*.lua", use = "edit" },
	{ url = "*.py", use = "edit" },
	{ url = "*.rs", use = "edit" },
	{ url = "*.sh", use = "edit" },
	{ url = "*.xml", use = "edit" },
]
