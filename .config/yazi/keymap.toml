[mgr]
prepend_keymap = [
    { on = [ "e" ], run = "shell 'start explorer %h'" },
    { on = [ "Q" ], run = "shell 'powershell -ExecutionPolicy Bypass -File C:/Users/localadmin/win_dev/QT/open-ui-file.ps1 %h'", desc = "Open in Qt Designer" },
    { on = "<Enter>", run = "plugin smart-enter", desc = "Enter the child directory, or open the file" },
]
